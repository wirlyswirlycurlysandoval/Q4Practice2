<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Switch Statement</h1>
    <button class="btn btn-info" onclick="teamRank()">Rank</button>
    <script>
        function teamRank(){
            var rank = "1st";

            message = "";

            switch (true){
                case (rank ==="1st"):
                    message = "champions";
                    break;
               case (rank ==="2nd"):
                    message = "2nd placer";
                    break;
                case (rank ==="3rd"):
                    message = "3rd placer";
                    break;
                case (rank ==="4th"):
                    message = "runner up";
                    break;
                default:
                    message = "not determined";
            }
            alert(message)
        }


        let team = "Red";//string

        switch(team){
            case "Red":
                alert("Go Red Bulldogs");
                break;
            case "Blue":
                alert("Go my Baby Blues");
                break;
            case "Green":
                alert("Lets go my sexy love!");
                break;
            case "Yellow":
                alert("Go breh");
                break;
            default:
                alert("Not determined");
                break;
        }
    </script>
</body>
</html>
