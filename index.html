<body>
    <h1>Switch Statement</h1>

    <script>
        let team = "Red";//string

        switch(team){
            case "Red":
                alert("Go Red Bulldogs");
                break;
            case "Blue":
                alert("Go my Baby Blues");
                break;
            case "Green":
                alert("Lets go my sexy love!");
                break;
            case "Yellow":
                alert("Go breh");
                break;
            default:
                alert("Not determined");
                break;
        }
    </script>
</body>
